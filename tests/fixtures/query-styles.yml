openapi: 3.0.3
info:
  title: Query Styles Fixture
  version: 1.0.0
paths:
  /search:
    get:
      operationId: searchWithStyles
      tags: [Query]
      parameters:
        - name: tags
          in: query
          required: false
          style: spaceDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: categories
          in: query
          required: false
          style: pipeDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: filters
          in: query
          required: false
          style: deepObject
          explode: true
          schema:
            type: object
            properties:
              status:
                type: string
              role:
                type: string
        - name: ids
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string