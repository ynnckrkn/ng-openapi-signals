openapi: 3.0.3
info:
  title: Records Fixture
  version: 1.0.0
paths:
  /config:
    get:
      operationId: getConfig
      tags: [Config]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
components:
  schemas:
    Config:
      type: object
      required:
        - metadata
        - tags
        - settings
      properties:
        metadata:
          type: object
          additionalProperties:
            type: string
        tags:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Tag"
        settings:
          type: object
          additionalProperties: true
        counts:
          type: object
          additionalProperties:
            type: integer
    Tag:
      type: object
      required:
        - label
      properties:
        label:
          type: string