openapi: 3.0.3
info:
  title: Composition Fixture
  version: 1.0.0
paths:
  /pets:
    get:
      operationId: getPets
      tags: [Pets]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
components:
  schemas:
    Named:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Aged:
      type: object
      required:
        - age
      properties:
        age:
          type: integer
    Pet:
      allOf:
        - $ref: "#/components/schemas/Named"
        - $ref: "#/components/schemas/Aged"
    Animal:
      oneOf:
        - $ref: "#/components/schemas/Pet"
        - type: object
          properties:
            kind:
              type: string
    Mixed:
      anyOf:
        - $ref: "#/components/schemas/Named"
        - $ref: "#/components/schemas/Aged"