            - MISSING
            - NVD
            - NAT
            - ADMIN
            - PILOT
            - OFFICE
            - SKIPPER
            - HOVKZ
      required:
        - sessionId
        - tokenHash
        - expiresAt
    GetUserDto:
      type: object
      properties:
        id:
          type: string
        refId:
          type: string
        role:
          type: array
          items:
            type: string
            enum:
              - MISSING
              - NVD
              - NAT
              - ADMIN
              - PILOT
              - OFFICE
              - SKIPPER
              - HOVKZ
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        mail:
          type: string
        phone:
          type: string
        company:
          type: string
