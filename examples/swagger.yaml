      summary: Create a new traffic structure
      tags: &ref_8
        - TrafficStructure
    put:
      description: >-
        Updates an existing traffic structure with the provided information.
        Requires traffic structure ID in the request body.
      operationId: updateTrafficStructure
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrafficStructureDto'
      responses:
        '200':
          description: Traffic structure successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTrafficStructureDto'
        '400':
          description: Bad request - Invalid traffic structure data or missing/invalid ID
        '404':
          description: Traffic structure not found
